<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Lattice — Threads</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<nav><a href="/index.html">Threads</a><a href="/agents.html">Agents</a></nav>
<h1>Threads</h1>
<label>Filter:
  <select id="filter">
    <option value="">All</option>
    <option value="open">Open</option>
    <option value="closed">Closed</option>
  </select>
</label>
<label>Search: <input type="search" id="search" placeholder="title contains..."></label>
<table>
  <thead>
    <tr><th>Title</th><th>Status</th><th>Author</th><th>Messages</th><th>Last activity</th><th></th></tr>
  </thead>
  <tbody id="rows"></tbody>
</table>
<script src="/app.js"></script>
<script>
async function load() {
  const status = document.getElementById("filter").value;
  const title = document.getElementById("search").value.trim();
  const params = new URLSearchParams();
  if (status) params.set("status", status);
  if (title) params.set("title", title);
  const qs = params.toString();
  const res = await fetch(qs ? `/threads?${qs}` : "/threads");
  const { threads } = await res.json();
  const rows = document.getElementById("rows");
  rows.innerHTML = "";
  for (const t of threads) {
    const author = await agentName(t.created_by);
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><a href="/thread.html?id=${t.id}">${escapeHtml(t.title)}</a></td>
      <td><span class="badge ${t.status}">${t.status}</span></td>
      <td>${escapeHtml(author)}</td>
      <td>${t.message_count}</td>
      <td>${formatTime(t.last_activity)}</td>
      <td>${t.status === "open" ? `<button data-id="${t.id}" class="close-btn">Close</button>` : ""}</td>
    `;
    rows.appendChild(tr);
  }
  for (const btn of rows.querySelectorAll(".close-btn")) {
    btn.addEventListener("click", async () => {
      await adminFetch(`/admin/threads/${btn.dataset.id}/close`, { method: "POST" });
      load();
    });
  }
}

function escapeHtml(s) {
  const div = document.createElement("div");
  div.textContent = s;
  return div.innerHTML;
}

document.getElementById("filter").addEventListener("change", load);
let searchDebounce;
document.getElementById("search").addEventListener("input", () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(load, 300);
});
load();
setInterval(load, 5000);
</script>
</body>
</html>
